  // Clean up dead AIs
  entities = entities.filter(e => e.isPlayer || e.alive || e.deathAnim > 0);

  // Water damage (lava removed)
  if (player.alive) {
    let pt = tiles[Math.floor(player.y)] && tiles[Math.floor(player.y)][Math.floor(player.x)];
    if (pt === 'water') {
      player.hp -= 0.5;
      spawnFloatingText(player.x, player.y, '-½', '#4fc3f7');
      if (player.hp <= 0) { player.hp = 0; player.alive = false; showDeath(); }
    }
  }
  for (let e of entities) {
    if (!e.alive || e.flying) continue;
    let et = tiles[Math.floor(e.y)] && tiles[Math.floor(e.y)][Math.floor(e.x)];
    if (et === 'water') e.hp -= 0.5;
    if (e.hp <= 0) { e.hp = 0; e.alive = false; e.deathAnim = 1; dropInventory(e); }
  }

  // Unstuck system: AI only — never applied to player
  for (let e of entities) {
    if (!e || !e.alive || e.isPlayer) continue;
    let dx = e.x - (e.lastX || e.x), dy = e.y - (e.lastY || e.y);
    if (dx*dx + dy*dy < 0.02) {
      e.stuckTimer = (e.stuckTimer || 0) + 1;
      if (e.stuckTimer >= 2) {
        e.stuckTimer = 0;
        // Try to push to random nearby open tile
        let pushed = false;
        for (let attempt = 0; attempt < 8; attempt++) {
          let angle = Math.random() * Math.PI * 2;
          let nx = e.x + Math.cos(angle) * 1.5;
          let ny = e.y + Math.sin(angle) * 1.5;
          nx = Math.max(2, Math.min(MAP_SIZE-3, nx));
          ny = Math.max(2, Math.min(MAP_SIZE-3, ny));
          if (walkable(Math.floor(nx), Math.floor(ny)) || e.flying) {
            e.x = nx; e.y = ny; pushed = true; break;
          }
        }
        if (!pushed) { e.x = Math.max(2, Math.min(MAP_SIZE-3, e.x)); e.y = Math.max(2, Math.min(MAP_SIZE-3, e.y)); }
      }
    } else {
      e.stuckTimer = 0;
    }
    e.lastX = e.x; e.lastY = e.y;
  }

  // AI item pickup (if near item and no enemy close)
  for (let e of entities) {
    if (!e.alive || e.isPlayer) continue;
    let nearEnemy = entities.some(o => o.alive && o.team !== e.team && distFloat(e, o) < 4);
    if (!nearEnemy && e.inventory.length < 3) {
      let nearItem = items.find(it => distFloat(e, it) < 0.8);
      if (nearItem) {
        let idx = items.indexOf(nearItem);
        items.splice(idx, 1);
        e.inventory.push(nearItem);
        if (nearItem.isFood) { e.hp = Math.min(e.maxHp, e.hp + 1); }
        else if (nearItem.stat && e.stats[nearItem.stat] !== undefined) { e.stats[nearItem.stat] = Math.min(9, e.stats[nearItem.stat] + (nearItem.golden ? 2 : 1)); }
      }
    }
  }

  // Castle capture logic
  for (let castle of castles) {
    let occupants = [...entities, player].filter(e => e && e.alive && distFloat(e, castle) < 1.8);
    if (occupants.length === 0) { castle.captureProgress = 0; castle.captureTeam = -1; continue; }

    // Count by team
    let teamCounts = {};
    for (let o of occupants) { teamCounts[o.team] = (teamCounts[o.team]||0)+1; }

    // If current owner still has troops here, castle cannot be captured — contest only
    if (castle.team >= 0 && teamCounts[castle.team] > 0) {
      // Owning team is defending — reset any capture progress by enemies
      castle.captureProgress = 0;
      castle.captureTeam = castle.team;
      continue; // Defenders hold
    }

    // Owner evicted (or castle neutral) — attacker can now claim it
    let topTeam = Object.keys(teamCounts).sort((a,b)=>teamCounts[b]-teamCounts[a])[0];
    if (castle.captureTeam !== Number(topTeam)) { castle.captureProgress = 0; castle.captureTeam = Number(topTeam); }
    castle.captureProgress += 0.5;
    if (castle.captureProgress >= 3 && castle.team !== Number(topTeam)) {
      castle.team = Number(topTeam);
      castle.captureProgress = 0;
      let teamNames = ['CHAOS','NATURE','ARCANE','IRON'];
      let tname = castle.team === player.team ? 'YOUR TEAM' : teamNames[castle.team]||'Unknown';
      addLog('🏰 Castle #'+(castles.indexOf(castle)+1)+' captured by '+tname+'!', 'log-world');
      gameEvents.push({time:gameTime,type:'castle_captured',detail:'Castle '+(castles.indexOf(castle)+1)+' captured by '+tname});
      // Spawn unit at castle
      let newAI = createEntity(randomName(castle.team), false, undefined, castle.team);
      newAI.x = castle.x + (Math.random()-0.5)*2; newAI.y = castle.y + (Math.random()-0.5)*2;
      entities.push(newAI);
      // Check win condition: one team owns ALL castles
      checkCastleWin();
    }
    // Periodic spawn from captured castle
    castle.spawnTimer = (castle.spawnTimer||0) + 0.5;
    if (castle.spawnTimer >= 10 && castle.team >= 0) {
      castle.spawnTimer = 0;
      let aiCount = entities.filter(e=>e.alive).length;
      if (aiCount < 30) {
        let newAI = createEntity(randomName(), false, undefined, castle.team);
        newAI.x = castle.x + (Math.random()-0.5)*3; newAI.y = castle.y + (Math.random()-0.5)*3;
        newAI.x = Math.max(2,Math.min(MAP_SIZE-3,newAI.x)); newAI.y = Math.max(2,Math.min(MAP_SIZE-3,newAI.y));
        entities.push(newAI);
        addLog('🏰 Castle spawns '+newAI.name+'!','log-world');
      }
    }
  }

  // Item scatter every 10s
  itemScatterTimer = (itemScatterTimer||0) + 0.5;
  if (itemScatterTimer >= 10) {
    itemScatterTimer = 0;
    scatterItems(2);
    spawnFoodItems(1);
  }

  // Host: AI spawn
  if (isHost) {
    aiSpawnTimer += 500;
    if (aiSpawnTimer >= 8000) {
      aiSpawnTimer = 0;
      let aiCount = entities.filter(e => !e.isPlayer && e.alive).length;
      if (aiCount < 30) {
        let isFlying = Math.random() < 0.12;
        let ai = createEntity(randomName(), false);
        if (isFlying) {
          ai.flying = true;
          const FLYING_NAMES = ['🦅 Eagle Rider','🐦 Storm Raven','🦉 Night Owl','🦋 Chaos Moth','🐝 Killer Bee','🕊️ Death Dove','🦜 Hex Parrot','🦆 War Duck'];
          ai.name = FLYING_NAMES[Math.floor(Math.random()*FLYING_NAMES.length)];
          ai.color = '#88eeff';
        }
        entities.push(ai);
        playSpawn();
        addLog((isFlying?'✈️ ':'')+ ai.name+' the '+ai.cls+' appears!', 'log-world');
      }
    }
  }

  // Clean stale remote players
  let now = Date.now();
  for (let id of Object.keys(remotePlayers)) {
    if (remotePlayers[id]._lastSeen && now - remotePlayers[id]._lastSeen > 5000) delete remotePlayers[id];
  }

  updateGoals();
  updateUI();
  broadcastState();
}

// --- World Update ---
function worldUpdate() {
  let px = 3 + Math.floor(Math.random() * (MAP_SIZE - 6));
  let py = 3 + Math.floor(Math.random() * (MAP_SIZE - 6));
  let tileTypes = ['grass', 'stone', 'forest', 'sand', 'swamp', 'ice'];
  let newType = tileTypes[Math.floor(Math.random() * tileTypes.length)];
  for (let dy = 0; dy < 3; dy++)
    for (let dx = 0; dx < 3; dx++)
      if (px+dx < MAP_SIZE-1 && py+dy < MAP_SIZE-1) tiles[py+dy][px+dx] = newType;

  scatterItems(3);

  if (Math.random() < 0.3) {
    let wx = 3 + Math.floor(Math.random() * (MAP_SIZE - 6));
    let wy = 3 + Math.floor(Math.random() * (MAP_SIZE - 6));
    let horiz = Math.random() < 0.5;
    for (let i = 0; i < 4; i++) {
      let x = wx + (horiz ? i : 0), y = wy + (horiz ? 0 : i);
      if (x < MAP_SIZE-1 && y < MAP_SIZE-1) tiles[y][x] = 'wall';
    }
  }

  // Occasionally spawn lava patches
  

  addLog('The world shifts...', 'log-world');
}

// --- Multiplayer ---
function initMultiplayer() {
  try {
    channel = new BroadcastChannel('rpg-arena');
  } catch (e) {
    channel = null;
    isHost = true;
    return;
  }

  isHost = true;
  channel.postMessage({ type: 'host-check', id: playerId, time: Date.now() });

  channel.onmessage = (ev) => {
    let data = ev.data;
    if (!data || !data.type) return;

    switch (data.type) {
      case 'host-check':
        if (data.id < playerId) isHost = false;
        break;

      case 'state':
        if (data.id === playerId) return;
        remotePlayers[data.id] = {
          id: data.id, name: data.name, x: data.x, y: data.y,
          hp: data.hp, maxHp: data.maxHp, alive: data.alive,
          cls: data.cls, color: data.color, isPlayer: true,
          _lastSeen: Date.now()
        };
        // Sync AI state from host
        if (data.isHost && !isHost && data.entities) {
          let aiEntities = data.entities;
          let hostAiIds = new Set(aiEntities.map(e => e.id));
          for (let ae of aiEntities) {
            let existing = entities.find(e => e.id === ae.id);
            if (existing) {
              let oldRX = existing.renderX, oldRY = existing.renderY;
              Object.assign(existing, ae);
              existing.renderX = oldRX !== undefined ? oldRX : ae.x;
              existing.renderY = oldRY !== undefined ? oldRY : ae.y;
            } else {
              ae.renderX = ae.x; ae.renderY = ae.y;
              entities.push(ae);
            }
          }
          entities = entities.filter(e => e.isPlayer || hostAiIds.has(e.id));
          if (player && !entities.includes(player)) entities.push(player);
        }
        if (data.isHost && data.tiles) tiles = data.tiles;
        if (data.isHost && data.items) items = data.items;
        break;

      case 'disconnect':
        delete remotePlayers[data.id];
        break;
    }
  };

  window.addEventListener('beforeunload', () => {
    if (channel) channel.postMessage({ type: 'disconnect', id: playerId });
  });
}

function broadcastState() {
  if (!channel || !player) return;
  let msg = {
    type: 'state', id: playerId, name: player.name,
    x: player.x, y: player.y, hp: player.hp, maxHp: player.maxHp,
    alive: player.alive, cls: player.cls, color: player.color, isHost
  };
  if (isHost) {
    msg.entities = entities.filter(e => !e.isPlayer).map(e => ({
      id: e.id, name: e.name, x: e.x, y: e.y,
      hp: e.hp, maxHp: e.maxHp, alive: e.alive,
      cls: e.cls, color: e.color, stats: e.stats,
      isPlayer: false, specialCooldown: e.specialCooldown,
      specialMaxCooldown: e.specialMaxCooldown,
      abilityActive: e.abilityActive, aiTimer: e.aiTimer,
      combatTimer: e.combatTimer, deathAnim: e.deathAnim,
      rallyBonus: e.rallyBonus, isAlly: e.isAlly,
      moveVX: e.moveVX, moveVY: e.moveVY
    }));
    if (Math.floor(gameTime * 2) % 10 === 0) {
      msg.tiles = tiles;
      msg.items = items;
    }
  }
  try { channel.postMessage(msg); } catch(e) {}
}

// --- Character Creation ---
function createCharacter() {
  initAudio();
  let name = document.getElementById('name-input').value.trim();
  if (!name) name = 'Hero';

  player = createEntity(name, true, playerId);
  // Give player their class emoji prefix once class is assigned
  let clsEmoji = CLASS_EMOJI[player.cls] || '🧑';
  player.displayName = clsEmoji + ' ' + name; // used in narrative/log
  entities.push(player);

  document.getElementById('creation-overlay').style.display = 'none';
  document.getElementById('game-container').style.display = 'grid';

  let pp = isoProject(player.x, player.y);
  camera.x = pp.sx; camera.y = pp.sy;

  addLog((player.displayName||player.name)+' the '+player.cls+' enters the arena!', 'log-info');
  addLog('Ability: '+ABILITIES[player.cls].name+' - '+ABILITIES[player.cls].desc, 'log-info');
  addLog('WASD/Arrows: move | Space: special | F: ranged attack | R: recruit | Walk into enemy: melee', 'log-info');
  addLog('Use the Recruit button to command nearby enemies!', 'log-info');

  if (isHost) {
    for (let i = 0; i < 8; i++) {
      let ai = createEntity(randomName(), false);
      entities.push(ai);
    }
  }

  initGoals();
  isDead = false;
  healTimer = 0;
  recruitCooldown = 0;
}

// --- Death ---
function showDeath() {
  isDead = true;
  document.getElementById('death-title').textContent = '☠️ YOU DIED';
  document.getElementById('death-overlay').style.display = 'flex';
  let finalScore = kills * 10 + itemsCollected * 5 + goalsCompleted * 25 + Math.floor(gameTime / 10);
  let narrative = generateNarrative();
  document.getElementById('death-stats').innerHTML =
    '<div>Kills: '+kills+' ('+kills*10+' pts)</div>' +
    '<div>Items: '+itemsCollected+' ('+itemsCollected*5+' pts)</div>' +
    '<div>Goals: '+goalsCompleted+' ('+goalsCompleted*25+' pts)</div>' +
    '<div>Survived: '+Math.floor(gameTime)+'s ('+Math.floor(gameTime/10)+' pts)</div>' +
    '<div style="margin-top:8px;font-size:20px;color:#f0c040">Final Score: '+finalScore+'</div>' +
    '<div style="margin-top:12px;padding:10px;background:rgba(255,220,100,0.08);border:1px solid #f0c04044;border-radius:6px;font-size:12px;color:#ddd;line-height:1.7;text-align:left;max-width:420px">'+narrative+'</div>' +
    '<button onclick="navigator.clipboard.writeText('+JSON.stringify(narrative)+')" style="margin-top:8px;padding:6px 16px;background:#333;border:1px solid #666;color:#fff;border-radius:4px;cursor:pointer">📋 Copy Chronicle</button>';
}

function respawn() {
  document.getElementById('death-overlay').style.display = 'none';
  entities = entities.filter(e => e.id !== playerId);
  let name = player.name;
  player = createEntity(name, true, playerId);
  player.displayName = (CLASS_EMOJI[player.cls]||'🧑') + ' ' + name;
  entities.push(player);
  kills = 0; itemsCollected = 0; goalsCompleted = 0; gameTime = 0;
  score = 0; isDead = false; inventoryLog = [];
  healTimer = 0; recruitCooldown = 0;
  initGoals();
  combatLogEntries = [];
  document.getElementById('combat-log').innerHTML = '';
  addLog((player.displayName||player.name)+' the '+player.cls+' returns!', 'log-info');
}

function playerWait() {
  if (player && player.alive) {
    player.hp = Math.min(player.maxHp, player.hp + 1);
    addLog('You rest for a moment. (+1 HP)', 'log-heal');
    spawnFloatingText(player.x, player.y, '+1', '#44ff44');
  }
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  keysDown[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (player && player.alive) useSpecial(player);
  }
  if (e.code === 'KeyR' && e.ctrlKey === false && e.metaKey === false) {
    if (player && player.alive) attemptRecruit();
  }
  if (e.code === 'KeyF') {
    if (player && player.alive) attemptRangedAttack();
  }
  if (!audioUnlocked) initAudio();
});

document.addEventListener('keyup', (e) => { delete keysDown[e.code]; });

document.getElementById('btn-special').addEventListener('click', () => {
  if (player && player.alive) useSpecial(player);
});

document.getElementById('btn-recruit').addEventListener('click', () => {
  if (player && player.alive) attemptRecruit();
});

document.getElementById('btn-ranged').addEventListener('click', () => {
  if (player && player.alive) attemptRangedAttack();
});

document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') createCharacter();
});

document.addEventListener('click', () => { if (!audioUnlocked) initAudio(); });

// --- Init ---
function resizeCanvas() {
  const w = window.innerWidth - 200 - 220;
  const h = window.innerHeight - 44 - 48;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
  }
  viewCX = canvas.width / 2;
  viewCY = canvas.height / 2;
  if (player) {
    const pp = isoProject(player.x, player.y);
    camera.x = pp.sx;
    camera.y = pp.sy;
  }
}

function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  generateMap();
  generateCastles();
  spawnStartingArmies();
  scatterItems(20);
  spawnFoodItems(8);
  initMultiplayer();
  setInterval(gameTick, 500);
  requestAnimationFrame(render);
}

init();
</script>
