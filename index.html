function checkLastTeamStanding() {
  if (victoryShown) return;
  // Count alive mobs per team (including player)
  let alive = [...entities];
  if (player && player.alive) alive.push(player);
  let teamAlive = {};
  for (let e of alive) {
    if (!e.alive) continue;
    let t = e.team;
    if (t === undefined || t < 0) continue;
    teamAlive[t] = (teamAlive[t]||0) + 1;
  }
  let teamsLeft = Object.keys(teamAlive).map(Number);
  if (teamsLeft.length <= 1) {
    let winTeam = teamsLeft[0] ?? -1;
    const TEAM_NAMES = ['CHAOS','NATURE','ARCANE','IRON'];
    const TEAM_BANNERS = ['🔴','🟢','🟣','🟠'];
    let winName = winTeam >= 0 ? TEAM_NAMES[winTeam] : 'Nobody';
    let winBanner = winTeam >= 0 ? TEAM_BANNERS[winTeam] : '💀';
    let isPlayerWin = player && player.team === winTeam && player.alive;
    victoryShown = true;
    showVictory(winName, winBanner, isPlayerWin, winTeam);
  }
}

function showVictory(teamName, banner, isPlayerTeam, winTeam) {
  let overlay = document.getElementById('death-overlay');
  let title = document.getElementById('death-title');
  let stats = document.getElementById('death-stats');
  if (!overlay) return;
  if (title) title.textContent = isPlayerTeam
    ? '🏆 VICTORY! LAST TEAM STANDING!'
    : banner + ' ' + teamName + ' WIPES THE FIELD!';
  let narrative = generateNarrative();
  let finalScore = kills*10 + itemsCollected*5 + goalsCompleted*25 + Math.floor(gameTime/10);
  if (stats) stats.innerHTML =
    '<div style="font-size:18px;color:'+(isPlayerTeam?'#f0c040':'#ff6666')+'">'+
    banner+' Team '+teamName+' stands alone!</div>' +
    '<div style="margin:8px 0">Your score: '+finalScore+'</div>' +
    '<div style="margin-top:12px;padding:10px;background:rgba(255,220,100,0.08);border:1px solid #f0c04044;border-radius:6px;font-size:12px;color:#ddd;line-height:1.7;text-align:left;max-width:420px">'+narrative+'</div>' +
    '<button onclick="navigator.clipboard.writeText('+JSON.stringify(narrative)+')" style="margin-top:8px;padding:6px 16px;background:#333;border:1px solid #666;color:#fff;border-radius:4px;cursor:pointer">📋 Copy Chronicle</button>';
  overlay.style.display = 'flex';
  if (!player || !player.alive) isDead = true; // spectator if already dead
}

function generateNarrative() {
  if (!player) return 'No game data.';
  const TEAM_NAMES = ['Chaos','Nature','Arcane','Iron'];
  const TEAM_BANNERS = ['🔴','🟢','🟣','🟠'];
  let totalAlive = entities.filter(e=>e.alive);
  let teamCounts = [0,0,0,0];
  for (let e of totalAlive) if (e.team>=0) teamCounts[e.team]++;
  let winTeam = teamCounts.indexOf(Math.max(...teamCounts));

  let pDisplay = player.displayName || (CLASS_EMOJI[player.cls]||'🧑')+' '+player.name;
  let pTeamBanner = TEAM_BANNERS[player.team] || '⚔️';
  let pTeamName = TEAM_NAMES[player.team] || 'Unknown';

  // Dramatic opening lines
  const openings = [
    `The drums of war echoed as ${pDisplay} the ${player.cls} charged into battle under the ${pTeamBanner} ${pTeamName} banner.`,
    `${pDisplay} stepped onto the blood-soaked field, fighting for ${pTeamBanner} ${pTeamName}.`,
    `The arena fell silent — then erupted as ${pDisplay} the ${player.cls} entered for ${pTeamBanner} ${pTeamName}.`,
  ];
  let lines = [openings[Math.floor(Math.random()*openings.length)]];

  // Pick most dramatic events
  let dramatic = [...gameEvents].sort((a,b) => {
    const w = {castle_captured:3, kill:2, recruit:2};
    return (w[b.type]||1) - (w[a.type]||1);
  }).slice(0, 7);
  dramatic.sort((a,b) => a.time - b.time);

  const killPhrases = ['cut down','slew','vanquished','destroyed','obliterated','dispatched'];
  const castlePhrases = ['seized','claimed','stormed','raised their flag over','conquered'];

  for (let ev of dramatic) {
    if (ev.type === 'kill') {
      let phrase = killPhrases[Math.floor(Math.random()*killPhrases.length)];
      lines.push(`At ${Math.floor(ev.time)}s — ${ev.detail.replace(' slew ', ' '+phrase+' ')}.`);
    }
    if (ev.type === 'castle_captured') {
      let phrase = castlePhrases[Math.floor(Math.random()*castlePhrases.length)];
      lines.push(`${ev.detail.replace('captured by', phrase+' it for')}.`);
    }
    if (ev.type === 'recruit') {
      lines.push(`A bold gambit: ${ev.detail}.`);
    }
  }

  // Ending
  let killerStr = (player && player.lastKilledBy) ? ` — cut down by ${player.lastKilledBy}` : '';
  const endings = [
    `After ${Math.floor(gameTime)} seconds of brutal combat, ${pDisplay} fell${killerStr}. Their legend written in blood.`,
    `${pDisplay}'s run ended at ${Math.floor(gameTime)}s${killerStr}. Remembered by those who watched.`,
    `The arena claimed ${pDisplay} after ${Math.floor(gameTime)} seconds of glory${killerStr}.`,
  ];
  lines.push(endings[Math.floor(Math.random()*endings.length)]);

  // Victor
  let winBanner = TEAM_BANNERS[winTeam] || '⚑';
  let winName = TEAM_NAMES[winTeam] || 'Unknown';
  lines.push(`As the dust settled, ${winBanner} ${winName} stood victorious with ${Math.max(...teamCounts)} warriors still standing.`);
  return lines.join(' ');
}

function drawMinimap() {
  let mmSize = 100;
  let mmX = canvas.width - mmSize - 10;
  let mmY = 10;
  let scale = mmSize / MAP_SIZE;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(mmX - 2, mmY - 2, mmSize + 4, mmSize + 4);

  for (let y = 0; y < MAP_SIZE; y++) {
    for (let x = 0; x < MAP_SIZE; x++) {
      let t = tiles[y][x];
      switch(t) {
        case 'grass': ctx.fillStyle = '#3a7a35'; break;
        case 'forest': ctx.fillStyle = '#2a5a25'; break;
        case 'stone': ctx.fillStyle = '#777'; break;
        case 'water': ctx.fillStyle = '#2a6aa0'; break;
        case 'wall': ctx.fillStyle = '#555'; break;
        case 'dungeon': ctx.fillStyle = '#442200'; break;
        case 'sand': ctx.fillStyle = '#b89050'; break;
        case 'lava': ctx.fillStyle = '#3a6030'; break; // treated as swamp
        case 'ice': ctx.fillStyle = '#a0d0e8'; break;
        case 'swamp': ctx.fillStyle = '#2a4820'; break;
        case 'bridge': ctx.fillStyle = '#8a6838'; break;
        default: ctx.fillStyle = '#333';
      }
      ctx.fillRect(mmX + x * scale, mmY + y * scale, Math.ceil(scale), Math.ceil(scale));
    }
  }

  // Entities on minimap
  for (let e of entities) {
    if (!e.alive) continue;
    ctx.fillStyle = e.isPlayer && e.id === playerId ? '#fff' : e.isAlly ? '#7fffbf' : e.color;
    ctx.fillRect(mmX + Math.round(e.x) * scale - 1, mmY + Math.round(e.y) * scale - 1, 3, 3);
  }

  // Items
  ctx.fillStyle = '#ff0';
  for (let item of items) {
    ctx.fillRect(mmX + item.x * scale, mmY + item.y * scale, 2, 2);
  }

  // Border
  ctx.strokeStyle = '#5a3a8a';
  ctx.lineWidth = 1;
  ctx.strokeRect(mmX - 2, mmY - 2, mmSize + 4, mmSize + 4);
}

// --- UI Updates ---
function updateUI() {
  if (!player) return;

  document.getElementById('class-name').textContent = player.cls + ' - ' + player.name;
  document.getElementById('class-name').style.color = player.color;

  let hpPct = Math.max(0, player.hp / player.maxHp);
  document.getElementById('hp-bar').style.width = (hpPct * 100) + '%';
  document.getElementById('hp-bar').style.background = hpPct > 0.5 ?
    'linear-gradient(90deg, #4caf50, #8bc34a)' : hpPct > 0.25 ?
    'linear-gradient(90deg, #ff9800, #ffc107)' : 'linear-gradient(90deg, #f44336, #ff5722)';
  document.getElementById('hp-text').textContent = player.hp + '/' + player.maxHp;

  document.getElementById('s-atk').textContent = player.stats.atk;
  document.getElementById('s-def').textContent = player.stats.def;
  document.getElementById('s-spd').textContent = player.stats.spd;
  document.getElementById('s-ene').textContent = player.stats.ene;
  document.getElementById('s-int').textContent = player.stats.int;
  document.getElementById('s-cmd').textContent = player.stats.cmd;

  let ab = ABILITIES[player.cls];
  document.getElementById('ability-info').textContent = ab.name + ': ' + ab.desc;

  // Inventory display
  let invEl = document.getElementById('inventory-list');
  invEl.innerHTML = inventoryLog.slice(-8).map(i => '<div style="color:'+i.color+'">'+i.name+'</div>').join('');

  // Special button
  let btn = document.getElementById('btn-special');
  btn.textContent = ab.name;
  btn.disabled = player.specialCooldown > 0 || !player.alive;
  document.getElementById('cooldown-text').textContent = player.specialCooldown > 0 ? 'CD: '+player.specialCooldown : 'Ready!';

  // Recruit button
  let recruitBtn = document.getElementById('btn-recruit');
  recruitBtn.disabled = recruitCooldown > 0 || !player.alive;
  document.getElementById('recruit-cooldown-text').textContent = recruitCooldown > 0 ? 'CD: '+Math.ceil(recruitCooldown)+'s' : '';
  let rangedBtn = document.getElementById('btn-ranged');
  rangedBtn.disabled = rangedCooldown > 0 || !player.alive;
  document.getElementById('ranged-cooldown-text').textContent = rangedCooldown > 0 ? 'CD: '+Math.ceil(rangedCooldown)+'s' : '(Range: '+player.stats.cmd+' tiles)';

  // Goals
  let gc = document.getElementById('goals-container');
  gc.innerHTML = '';
  for (let g of goals) {
    let pct = Math.min(100, (g.progress / g.target) * 100);
    let div = document.createElement('div');
    div.className = 'goal-item';
    div.innerHTML = '<div class="goal-text">'+g.text+' ('+Math.floor(g.progress)+'/'+g.target+')</div>' +
      '<div class="goal-bar-bg"><div class="goal-bar-fill" style="width:'+pct+'%"></div></div>';
    gc.appendChild(div);
  }

  // Top bar
  let mins = Math.floor(gameTime / 60), secs = Math.floor(gameTime % 60);
  document.getElementById('game-time').textContent = String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  score = kills * 10 + itemsCollected * 5 + goalsCompleted * 25 + Math.floor(gameTime / 10);
  document.getElementById('score-display').textContent = score;
  document.getElementById('player-count').textContent = 1 + Object.keys(remotePlayers).length;

  // Nearby
  let nearbyEl = document.getElementById('nearby-list');
  nearbyEl.innerHTML = '';
  let nearby = entities.filter(e => e.alive && e.id !== playerId && distFloat(e, player) <= 8);
  nearby.sort((a, b) => distFloat(a, player) - distFloat(b, player));
  for (let e of nearby.slice(0, 8)) {
    let d2 = distFloat(e, player).toFixed(1);
    let div = document.createElement('div');
    div.className = 'nearby-entity';
    let allyTag = e.isAlly ? ' [ALLY]' : '';
    div.innerHTML = '<span style="color:'+e.color+'">'+e.name+allyTag+'</span><span>'+e.cls+' HP:'+e.hp+' D:'+d2+'</span>';
    nearbyEl.appendChild(div);
  }
}

// --- Game Logic Tick (500ms) ---
function gameTick() {
  if (!player) return;
  gameTime += 0.5;

  // Healing timer: every 6 ticks (3 seconds), heal 1 HP
  healTimer++;
  if (healTimer >= 6) {
    healTimer = 0;
    // Heal player
    if (player.alive && player.hp < player.maxHp) {
      player.hp = Math.min(player.maxHp, player.hp + 1);
      spawnFloatingText(player.x, player.y, '+1', '#44ff44');
    }
    // Heal AI entities
    for (let e of entities) {
      if (!e.isPlayer && e.alive && e.hp < e.maxHp) {
        e.hp = Math.min(e.maxHp, e.hp + 1);
      }
    }
  }

  // Recruit cooldown
  if (recruitCooldown > 0) { recruitCooldown -= 0.5; if (recruitCooldown < 0) recruitCooldown = 0; }
  // Ranged cooldown
  if (rangedCooldown > 0) { rangedCooldown -= 0.5; if (rangedCooldown < 0) rangedCooldown = 0; }

  // Player energy recharge inside own castle (5s per point)
  if (player && player.alive) {
    let inOwnCastle = castles.find(c => c.team === player.team && distFloat(player, c) < 2);
    if (inOwnCastle && player.energy < player.maxEnergy) {
      player.energyRechargeTimer = (player.energyRechargeTimer||0) + 1;
      if (player.energyRechargeTimer >= 10) {
        player.energyRechargeTimer = 0;
        player.energy = Math.min(player.maxEnergy, player.energy + 1);
        spawnFloatingText(player.x, player.y, '⚡+1', '#44aaff');
        addLog('⚡ Energy restored in your castle! ('+player.energy+'/'+player.maxEnergy+')', 'log-heal');
      }
    }
  }

  // Cooldown reduction for player special
  if (player.alive && gameTime % 1 === 0 && player.specialCooldown > 0) player.specialCooldown--;

  // AI special cooldown
  for (let e of entities) {
    if (!e.isPlayer && e.alive && e.specialCooldown > 0 && Math.random() < 0.5) e.specialCooldown--;
  }

  // Clean up dead AIs
  entities = entities.filter(e => e.isPlayer || e.alive || e.deathAnim > 0);

  // Water damage (lava removed)
  if (player.alive) {
    let pt = tiles[Math.floor(player.y)] && tiles[Math.floor(player.y)][Math.floor(player.x)];
    if (pt === 'water') {
      player.hp -= 0.5;
      spawnFloatingText(player.x, player.y, '-½', '#4fc3f7');
      if (player.hp <= 0) { player.hp = 0; player.alive = false; showDeath(); }
    }
  }
  for (let e of entities) {
    if (!e.alive || e.flying) continue;
    let et = tiles[Math.floor(e.y)] && tiles[Math.floor(e.y)][Math.floor(e.x)];
    if (et === 'water') e.hp -= 0.5;
    if (e.hp <= 0) { e.hp = 0; e.alive = false; e.deathAnim = 1; dropInventory(e); }
  }

  // Unstuck system: AI only — never applied to player
  for (let e of entities) {
    if (!e || !e.alive || e.isPlayer) continue;
    let dx = e.x - (e.lastX || e.x), dy = e.y - (e.lastY || e.y);
    if (dx*dx + dy*dy < 0.02) {
      e.stuckTimer = (e.stuckTimer || 0) + 1;
      if (e.stuckTimer >= 2) {
        e.stuckTimer = 0;
        // Try to push to random nearby open tile
        let pushed = false;
        for (let attempt = 0; attempt < 8; attempt++) {
          let angle = Math.random() * Math.PI * 2;
          let nx = e.x + Math.cos(angle) * 1.5;
          let ny = e.y + Math.sin(angle) * 1.5;
          nx = Math.max(2, Math.min(MAP_SIZE-3, nx));
          ny = Math.max(2, Math.min(MAP_SIZE-3, ny));
          if (walkable(Math.floor(nx), Math.floor(ny)) || e.flying) {
            e.x = nx; e.y = ny; pushed = true; break;
          }
        }
        if (!pushed) { e.x = Math.max(2, Math.min(MAP_SIZE-3, e.x)); e.y = Math.max(2, Math.min(MAP_SIZE-3, e.y)); }
      }
    } else {
      e.stuckTimer = 0;
    }
    e.lastX = e.x; e.lastY = e.y;
  }

  // AI item pickup + food healing
  for (let e of entities) {
    if (!e.alive || e.isPlayer) continue;
    let nearItem = items.find(it => distFloat(e, it) < 0.8);
    if (nearItem) {
      let idx = items.indexOf(nearItem);
      items.splice(idx, 1);
      if (nearItem.isFood) {
        e.hp = Math.min(e.maxHp, e.hp + 2);
        if (e.aiState === 'retreat' && e.hp >= e.maxHp * 0.5) e.aiState = 'battle';
      } else if (nearItem.stat && e.stats[nearItem.stat] !== undefined && e.inventory.length < 3) {
        e.inventory.push(nearItem);
        e.stats[nearItem.stat] = Math.min(9, e.stats[nearItem.stat] + (nearItem.golden ? 2 : 1));
      }
    }
    // Energy recharge when inside own castle (5s per point)
    if (e.aiState === 'recharge' && e.energy < e.maxEnergy) {
      e.energyRechargeTimer = (e.energyRechargeTimer || 0) + 0.5; // gameTick fires ~2/s
      if (e.energyRechargeTimer >= 10) { // 10 ticks × 0.5s = 5s per point
        e.energyRechargeTimer = 0;
        e.energy = Math.min(e.maxEnergy, e.energy + 1);
      }
    }
  }

  // Check last-team-standing win condition
  checkLastTeamStanding();

  // Castle capture logic
  for (let castle of castles) {
    let occupants = [...entities, player].filter(e => e && e.alive && distFloat(e, castle) < 1.8);
    if (occupants.length === 0) { castle.captureProgress = 0; castle.captureTeam = -1; continue; }

    // Count by team
    let teamCounts = {};
    for (let o of occupants) { teamCounts[o.team] = (teamCounts[o.team]||0)+1; }

    // If current owner still has troops here, castle cannot be captured — contest only
    if (castle.team >= 0 && teamCounts[castle.team] > 0) {
      // Owning team is defending — reset any capture progress by enemies
      castle.captureProgress = 0;
      castle.captureTeam = castle.team;
      continue; // Defenders hold
    }

    // Owner evicted (or castle neutral) — attacker can now claim it
    let topTeam = Object.keys(teamCounts).sort((a,b)=>teamCounts[b]-teamCounts[a])[0];
    if (castle.captureTeam !== Number(topTeam)) { castle.captureProgress = 0; castle.captureTeam = Number(topTeam); }
    castle.captureProgress += 0.5;
    if (castle.captureProgress >= 3 && castle.team !== Number(topTeam)) {
      castle.team = Number(topTeam);
      castle.captureProgress = 0;
      let teamNames = ['CHAOS','NATURE','ARCANE','IRON'];
      let tname = castle.team === player.team ? 'YOUR TEAM' : teamNames[castle.team]||'Unknown';
      addLog('🏰 Castle #'+(castles.indexOf(castle)+1)+' captured by '+tname+'!', 'log-world');
      gameEvents.push({time:gameTime,type:'castle_captured',detail:'Castle '+(castles.indexOf(castle)+1)+' captured by '+tname});
      // Spawn unit at castle
      let newAI = createEntity(randomName(castle.team), false, undefined, castle.team);
      newAI.x = castle.x + (Math.random()-0.5)*2; newAI.y = castle.y + (Math.random()-0.5)*2;
      entities.push(newAI);
      // Check win condition: one team owns ALL castles
      checkCastleWin();
    }
    // Periodic spawn from captured castle
    castle.spawnTimer = (castle.spawnTimer||0) + 0.5;
    if (castle.spawnTimer >= 30 && castle.team >= 0) {
      castle.spawnTimer = 0;
      let aiCount = entities.filter(e=>e.alive).length;
      if (aiCount < 30) {
        let newAI = createEntity(randomName(), false, undefined, castle.team);
        newAI.x = castle.x + (Math.random()-0.5)*3; newAI.y = castle.y + (Math.random()-0.5)*3;
        newAI.x = Math.max(2,Math.min(MAP_SIZE-3,newAI.x)); newAI.y = Math.max(2,Math.min(MAP_SIZE-3,newAI.y));
        entities.push(newAI);
        addLog('🏰 Castle spawns '+newAI.name+'!','log-world');
      }
    }
  }

  // Item scatter every 10s
  itemScatterTimer = (itemScatterTimer||0) + 0.5;
  if (itemScatterTimer >= 10) {
    itemScatterTimer = 0;
    scatterItems(2);
    spawnFoodItems(1);
  }

  // Host: AI spawn
  if (isHost) {
    aiSpawnTimer += 500;
    if (aiSpawnTimer >= 8000) {
      aiSpawnTimer = 0;
      let aiCount = entities.filter(e => !e.isPlayer && e.alive).length;
      if (aiCount < 30) {
        let isFlying = Math.random() < 0.12;
        let ai = createEntity(randomName(), false);
        if (isFlying) {
          ai.flying = true;
          const FLYING_NAMES = ['🦅 Eagle Rider','🐦 Storm Raven','🦉 Night Owl','🦋 Chaos Moth','🐝 Killer Bee','🕊️ Death Dove','🦜 Hex Parrot','🦆 War Duck'];
          ai.name = FLYING_NAMES[Math.floor(Math.random()*FLYING_NAMES.length)];
          ai.color = '#88eeff';
        }
        entities.push(ai);
        playSpawn();
        addLog((isFlying?'✈️ ':'')+ ai.name+' the '+ai.cls+' appears!', 'log-world');
      }
    }
  }

  // Clean stale remote players
  let now = Date.now();
  for (let id of Object.keys(remotePlayers)) {
    if (remotePlayers[id]._lastSeen && now - remotePlayers[id]._lastSeen > 5000) delete remotePlayers[id];
  }

  tickNarration(0.5); // gameTick fires every ~500ms
  updateGoals();
  updateUI();
  refreshActionButtons();
  broadcastState();
}

// --- World Update ---
function worldUpdate() {
  let px = 3 + Math.floor(Math.random() * (MAP_SIZE - 6));
  let py = 3 + Math.floor(Math.random() * (MAP_SIZE - 6));
  let tileTypes = ['grass', 'stone', 'forest', 'sand', 'swamp', 'ice'];
  let newType = tileTypes[Math.floor(Math.random() * tileTypes.length)];
  for (let dy = 0; dy < 3; dy++)
    for (let dx = 0; dx < 3; dx++)
      if (px+dx < MAP_SIZE-1 && py+dy < MAP_SIZE-1) tiles[py+dy][px+dx] = newType;

  scatterItems(3);

  if (Math.random() < 0.3) {
    let wx = 3 + Math.floor(Math.random() * (MAP_SIZE - 6));
    let wy = 3 + Math.floor(Math.random() * (MAP_SIZE - 6));
    let horiz = Math.random() < 0.5;
    for (let i = 0; i < 4; i++) {
      let x = wx + (horiz ? i : 0), y = wy + (horiz ? 0 : i);
      if (x < MAP_SIZE-1 && y < MAP_SIZE-1) tiles[y][x] = 'wall';
    }
  }

  // Occasionally spawn lava patches
  

  addLog('The world shifts...', 'log-world');
}

// --- Multiplayer ---
function initMultiplayer() {
  try {
    channel = new BroadcastChannel('rpg-arena');
  } catch (e) {
    channel = null;
    isHost = true;
    return;
  }

  isHost = true;
  channel.postMessage({ type: 'host-check', id: playerId, time: Date.now() });

  channel.onmessage = (ev) => {
    let data = ev.data;
    if (!data || !data.type) return;

    switch (data.type) {
      case 'host-check':
        if (data.id < playerId) isHost = false;
        break;

      case 'state':
        if (data.id === playerId) return;
        remotePlayers[data.id] = {
          id: data.id, name: data.name, x: data.x, y: data.y,
          hp: data.hp, maxHp: data.maxHp, alive: data.alive,
          cls: data.cls, color: data.color, isPlayer: true,
          _lastSeen: Date.now()
        };
        // Sync AI state from host
        if (data.isHost && !isHost && data.entities) {
          let aiEntities = data.entities;
          let hostAiIds = new Set(aiEntities.map(e => e.id));
          for (let ae of aiEntities) {
            let existing = entities.find(e => e.id === ae.id);
            if (existing) {
              let oldRX = existing.renderX, oldRY = existing.renderY;
              Object.assign(existing, ae);
              existing.renderX = oldRX !== undefined ? oldRX : ae.x;
              existing.renderY = oldRY !== undefined ? oldRY : ae.y;
            } else {
              ae.renderX = ae.x; ae.renderY = ae.y;
              entities.push(ae);
            }
          }
          entities = entities.filter(e => e.isPlayer || hostAiIds.has(e.id));
          if (player && !entities.includes(player)) entities.push(player);
        }
        if (data.isHost && data.tiles) tiles = data.tiles;
        if (data.isHost && data.items) items = data.items;
        break;

      case 'disconnect':
        delete remotePlayers[data.id];
        break;
    }
  };

  window.addEventListener('beforeunload', () => {
    if (channel) channel.postMessage({ type: 'disconnect', id: playerId });
  });
}

function broadcastState() {
  if (!channel || !player) return;
  let msg = {
    type: 'state', id: playerId, name: player.name,
    x: player.x, y: player.y, hp: player.hp, maxHp: player.maxHp,
    alive: player.alive, cls: player.cls, color: player.color, isHost
  };
  if (isHost) {
    msg.entities = entities.filter(e => !e.isPlayer).map(e => ({
      id: e.id, name: e.name, x: e.x, y: e.y,
      hp: e.hp, maxHp: e.maxHp, alive: e.alive,
      cls: e.cls, color: e.color, stats: e.stats,
      isPlayer: false, specialCooldown: e.specialCooldown,
      specialMaxCooldown: e.specialMaxCooldown,
      abilityActive: e.abilityActive, aiTimer: e.aiTimer,
      combatTimer: e.combatTimer, deathAnim: e.deathAnim,
      rallyBonus: e.rallyBonus, isAlly: e.isAlly,
      moveVX: e.moveVX, moveVY: e.moveVY
    }));
    if (Math.floor(gameTime * 2) % 10 === 0) {
      msg.tiles = tiles;
      msg.items = items;
    }
  }
  try { channel.postMessage(msg); } catch(e) {}
}

// --- Character Creation ---
function createCharacter() {
  initAudio();
  let name = document.getElementById('name-input').value.trim();
  if (!name) name = 'Hero';

  player = createEntity(name, true, playerId);
  // Give player their class emoji prefix once class is assigned
  let clsEmoji = CLASS_EMOJI[player.cls] || '🧑';
  player.displayName = clsEmoji + ' ' + name; // used in narrative/log
  entities.push(player);

  document.getElementById('creation-overlay').style.display = 'none';
  document.getElementById('game-container').style.display = 'grid';

  let pp = isoProject(player.x, player.y);
  camera.x = pp.sx; camera.y = pp.sy;

  let theme = detectTheme(name);
  addLog((player.displayName||player.name)+' the '+player.cls+' enters the arena!', 'log-info');
  addLog('Theme detected: '+theme.key.toUpperCase()+' | Ability: '+ABILITIES[player.cls].name, 'log-info');
  addLog('Click action buttons below • WASD to move • buttons light up when ready', 'log-info');
  buildActionButtons();

  if (isHost) {
    for (let i = 0; i < 8; i++) {
      let ai = createEntity(randomName(), false);
      entities.push(ai);
    }
  }

  initGoals();
  isDead = false;
  healTimer = 0;
  recruitCooldown = 0;
}

// --- Death ---
function showDeath() {
  // Game continues — spectator mode. Show a small banner, not the full overlay.
  let killerStr = player && player.lastKilledBy ? ' — slain by ' + player.lastKilledBy : '';
  addLog('☠️ You have fallen'+killerStr+'. Watching as spectator...', 'log-damage');
  spawnFloatingText(player.x, player.y, '☠️ FALLEN', '#ff4444');
  // Switch camera to overview
  isDead = true;
  spectatorMode = true;
  // Show the end overlay only when the game is actually over (victory fires it)
}

function respawn() {
  document.getElementById('death-overlay').style.display = 'none';
  // Full reset — fresh map, fresh factions
  let name = player ? player.name : 'Hero';
  entities = [];
  items = [];
  castles = [];
  floatingTexts = [];
  projectiles = [];
  gameEvents = [];
  kills = 0; itemsCollected = 0; goalsCompleted = 0; gameTime = 0;
  score = 0; isDead = false; spectatorMode = false; victoryShown = false;
  inventoryLog = []; healTimer = 0; recruitCooldown = 0;
  aiSpawnTimer = 0; worldUpdateTimer = 0;

  generateMap();
  generateCastles();
  spawnStartingArmies();
  scatterItems(20);
  spawnFoodItems(8);

  player = createEntity(name, true, playerId);
  player.displayName = (CLASS_EMOJI[player.cls]||'🧑') + ' ' + name;
  player.lastKilledBy = null;
  entities.push(player);

  let pp = isoProject(player.x, player.y);
  camera.x = pp.sx; camera.y = pp.sy;

  initGoals();
  combatLogEntries = [];
  document.getElementById('combat-log').innerHTML = '';
  addLog((player.displayName||player.name)+' the '+player.cls+' returns!', 'log-info');
  narrationTimer = 0; narrationQueue = [];
  buildActionButtons();
}

function playerWait() {
  if (player && player.alive) {
    player.hp = Math.min(player.maxHp, player.hp + 1);
    addLog('You rest for a moment. (+1 HP)', 'log-heal');
    spawnFloatingText(player.x, player.y, '+1', '#44ff44');
  }
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  keysDown[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (player && player.alive) useSpecial(player);
  }
  if (e.code === 'KeyR' && e.ctrlKey === false && e.metaKey === false) {
    if (player && player.alive) attemptRecruit();
  }
  if (e.code === 'KeyF') {
    if (player && player.alive) attemptRangedAttack();
  }
  if (!audioUnlocked) initAudio();
});

document.addEventListener('keyup', (e) => { delete keysDown[e.code]; });

document.getElementById('btn-special').addEventListener('click', () => {
  if (player && player.alive) useSpecial(player);
});

document.getElementById('btn-recruit').addEventListener('click', () => {
  if (player && player.alive) attemptRecruit();
});

document.getElementById('btn-ranged').addEventListener('click', () => {
  if (player && player.alive) attemptRangedAttack();
});

document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') createCharacter();
});

document.addEventListener('click', () => { if (!audioUnlocked) initAudio(); });

// --- Init ---
function resizeCanvas() {
  const w = window.innerWidth - 200 - 220;
  const h = window.innerHeight - 44 - 48;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
  }
  viewCX = canvas.width / 2;
  viewCY = canvas.height / 2;

  // Compute tile size so the full MAP_SIZE×MAP_SIZE iso diamond fits in the canvas.
  // Iso diamond width  = (MAP_SIZE-1) * TILE_W
  // Iso diamond height = (MAP_SIZE-1) * TILE_H  (= TILE_W/2)
  // Fit with a small margin (0.92 = ~8% padding on each side)
  let tileByW = Math.floor(canvas.width  * 0.92 / (MAP_SIZE - 1));
  let tileByH = Math.floor(canvas.height * 0.92 / ((MAP_SIZE - 1) / 2));
  let newTileW = Math.max(4, Math.min(tileByW, tileByH));
  // Snap to even number so TILE_H = TILE_W/2 stays integer
  if (newTileW % 2 !== 0) newTileW--;
  TILE_W = newTileW;
  TILE_H = TILE_W / 2;

  // Lock camera to map center (entire map always visible)
  let mid = isoProject(MAP_SIZE / 2, MAP_SIZE / 2);
  camera.x = mid.sx;
  camera.y = mid.sy;
}

function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Mouse-wheel zoom
  document.getElementById('canvas-container').addEventListener('wheel', (e) => {
    e.preventDefault();
    let delta = e.deltaY > 0 ? -0.9 : 1.1; // zoom out / in
    let newTW = Math.round(TILE_W * delta);
    if (newTW % 2 !== 0) newTW += 1;
    // Clamp: min = auto-fit (so full map always fits), max = 4× auto-fit
    let tileByW = Math.floor(canvas.width  * 0.92 / (MAP_SIZE - 1));
    let tileByH = Math.floor(canvas.height * 0.92 / ((MAP_SIZE - 1) / 2));
    let minTile = Math.max(2, Math.min(tileByW, tileByH));
    if (minTile % 2 !== 0) minTile--;
    let maxTile = minTile * 4;
    newTW = Math.max(minTile, Math.min(maxTile, newTW));
    TILE_W = newTW;
    TILE_H = TILE_W / 2;
    // Keep camera centered on map
    let mid = isoProject(MAP_SIZE/2, MAP_SIZE/2);
    camera.x = mid.sx; camera.y = mid.sy;
  }, { passive: false });
  generateMap();
  generateCastles();
  spawnStartingArmies();
  scatterItems(20);
  spawnFoodItems(8);
  initMultiplayer();
  setInterval(gameTick, 500);
  requestAnimationFrame(render);
}

init();
