<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Arena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }

#game-container { display: none; width: 100vw; height: 100vh; grid-template-rows: 44px 1fr 48px; grid-template-columns: 200px 1fr 220px; }

/* Top bar */
#top-bar { grid-column: 1 / -1; background: linear-gradient(180deg, #2a1a3e, #1a1a2e); display: flex; align-items: center; padding: 0 16px; gap: 24px; border-bottom: 2px solid #5a3a8a; }
#top-bar h1 { font-size: 18px; color: #f0c040; text-shadow: 0 0 10px #f0c04088; letter-spacing: 2px; }
.top-stat { font-size: 13px; color: #bbb; }
.top-stat span { color: #fff; font-weight: bold; }

/* Left panel */
#left-panel { background: linear-gradient(180deg, #1e1e3a, #161630); border-right: 2px solid #3a2a5a; overflow-y: auto; display: flex; flex-direction: column; }
.panel-section { padding: 10px; border-bottom: 1px solid #3a2a5a; }
.panel-section h3 { font-size: 12px; text-transform: uppercase; color: #888; letter-spacing: 1px; margin-bottom: 6px; }
#class-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
#hp-bar-container { width: 100%; height: 14px; background: #333; border-radius: 7px; overflow: hidden; margin: 4px 0; }
#hp-bar { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); border-radius: 7px; transition: width 0.3s; }
#hp-text { font-size: 11px; text-align: center; margin-top: -14px; position: relative; z-index: 1; color: #fff; text-shadow: 0 0 3px #000; }
.stat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
.stat-val { font-weight: bold; }
#ability-info { font-size: 11px; color: #aaa; margin-top: 4px; }

/* Goals */
.goal-item { margin-bottom: 8px; }
.goal-item .goal-text { font-size: 11px; margin-bottom: 2px; }
.goal-bar-bg { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
.goal-bar-fill { height: 100%; background: linear-gradient(90deg, #f0c040, #ff8800); border-radius: 4px; transition: width 0.3s; }

/* Canvas area */
#canvas-container { position: relative; overflow: hidden; background: #111; }
#gameCanvas { display: block; width: 100%; height: 100%; }

/* Right panel */
#right-panel { background: linear-gradient(180deg, #1e1e3a, #161630); border-left: 2px solid #3a2a5a; display: flex; flex-direction: column; }
#combat-log { flex: 1; overflow-y: auto; padding: 8px; font-size: 11px; line-height: 1.5; }
#combat-log div { padding: 1px 0; border-bottom: 1px solid #2a2a4a; }
.log-damage { color: #ff6666; }
.log-heal { color: #66ff66; }
.log-info { color: #6688ff; }
.log-item { color: #ffcc44; }
.log-goal { color: #44ffcc; }
.log-world { color: #cc88ff; }
.log-narrate { font-style: italic; opacity: 0.92; }
.log-recruit { color: #7fffbf; }
#nearby-panel { border-top: 1px solid #3a2a5a; padding: 8px; max-height: 200px; overflow-y: auto; }
#nearby-panel h3 { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
.nearby-entity { font-size: 11px; padding: 2px 0; display: flex; justify-content: space-between; }

/* Bottom bar */
#bottom-bar { grid-column: 1 / -1; background: linear-gradient(0deg, #2a1a3e, #1a1a2e); border-top: 2px solid #5a3a8a; display: flex; align-items: center; gap: 8px; padding: 4px 12px; min-height: 48px; }
.action-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #666; color: #fff; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.15s; white-space: nowrap; }
.action-btn:hover { filter: brightness(1.3); transform: translateY(-1px); }
.action-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
.action-btn .cd { font-size: 10px; opacity: 0.7; margin-left: 4px; }
#btn-special { padding: 8px 24px; background: linear-gradient(180deg, #6a3aaa, #4a2a7a); border: 1px solid #8a5aca; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
#btn-special:hover { background: linear-gradient(180deg, #8a5aca, #6a3aaa); }
#btn-special:disabled { opacity: 0.4; cursor: default; }
#btn-ranged { padding: 8px 24px; background: linear-gradient(180deg, #8a6a2a, #6a4a1a); border: 1px solid #caaa4a; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
#btn-ranged:hover { background: linear-gradient(180deg, #aa8a3a, #8a6a2a); }
#btn-ranged:disabled { opacity: 0.4; cursor: default; }
#btn-recruit { padding: 8px 24px; background: linear-gradient(180deg, #2a8a4a, #1a6a3a); border: 1px solid #4aca6a; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.2s; }
#btn-recruit:hover { background: linear-gradient(180deg, #3aaa5a, #2a8a4a); }
#btn-recruit:disabled { opacity: 0.4; cursor: default; }
#btn-wait { padding: 8px 16px; background: #333; border: 1px solid #555; color: #aaa; border-radius: 6px; cursor: pointer; font-size: 13px; }
#btn-wait:hover { background: #444; }
#cooldown-text { font-size: 12px; color: #aaa; }
#recruit-cooldown-text { font-size: 12px; color: #aaa; }
#ranged-cooldown-text { font-size: 12px; color: #cca84a; }

/* Creation overlay */
#creation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
#creation-box { background: linear-gradient(135deg, #2a1a4e, #1a1a3e); border: 2px solid #6a4aaa; border-radius: 16px; padding: 40px; text-align: center; min-width: 360px; box-shadow: 0 0 60px #4a2a8a44; }
#creation-box h2 { font-size: 28px; color: #f0c040; margin-bottom: 8px; text-shadow: 0 0 20px #f0c04066; }
#creation-box p { color: #999; font-size: 13px; margin-bottom: 20px; }
#name-input { width: 260px; padding: 10px 16px; background: #1a1a2e; border: 1px solid #5a3a8a; border-radius: 8px; color: #fff; font-size: 16px; text-align: center; outline: none; }
#name-input:focus { border-color: #8a5aca; box-shadow: 0 0 10px #8a5aca44; }
#btn-create { display: block; margin: 20px auto 0; padding: 12px 32px; background: linear-gradient(180deg, #f0c040, #cc9920); border: none; border-radius: 8px; color: #1a1a2e; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
#btn-create:hover { transform: scale(1.05); box-shadow: 0 0 20px #f0c04066; }

/* Death overlay */
#death-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 90; }
#death-box { background: linear-gradient(135deg, #3a1a1a, #2a1a1a); border: 2px solid #aa3333; border-radius: 16px; padding: 40px; text-align: center; min-width: 360px; }
#death-box h2 { font-size: 32px; color: #ff4444; margin-bottom: 8px; text-shadow: 0 0 20px #ff444466; }
#death-stats { color: #ccc; font-size: 14px; line-height: 2; margin: 16px 0; }
#btn-respawn { padding: 12px 32px; background: linear-gradient(180deg, #44aa44, #338833); border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }
#btn-respawn:hover { transform: scale(1.05); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #4a3a6a; border-radius: 3px; }
</style>
</head>
<body>

<!-- Creation Overlay -->
<div id="creation-overlay">
  <div id="creation-box">
    <h2>RPG ARENA</h2>
    <p>Enter the arena. Fight AI mobs and other players.<br>Your class is determined by your highest stat.</p>
    <input type="text" id="name-input" placeholder="Enter your name..." maxlength="16" autofocus>
    <button id="btn-create" onclick="createCharacter()">Create Character</button>
  </div>
</div>

<!-- Death Overlay -->
<div id="death-overlay">
  <div id="death-box">
    <h2 id="death-title">YOU DIED</h2>
    <div id="death-stats"></div>
    <button id="btn-respawn" onclick="respawn()">Play Again</button>
  </div>
</div>

<!-- Game UI -->
<div id="game-container">
  <!-- Top Bar -->
  <div id="top-bar">
    <h1>RPG ARENA</h1>
    <div class="top-stat">Players: <span id="player-count">1</span></div>
    <div class="top-stat">Time: <span id="game-time">00:00</span></div>
    <div class="top-stat">Score: <span id="score-display">0</span></div>
  </div>

  <!-- Left Panel -->
  <div id="left-panel">
    <div class="panel-section">
      <h3>Character</h3>
      <div id="class-name">-</div>
      <div id="hp-bar-container"><div id="hp-bar" style="width:100%"></div></div>
      <div id="hp-text">10/10</div>
      <div class="stat-row"><span>ATK</span><span class="stat-val" id="s-atk">0</span></div>
      <div class="stat-row"><span>DEF</span><span class="stat-val" id="s-def">0</span></div>
      <div class="stat-row"><span>SPD</span><span class="stat-val" id="s-spd">0</span></div>
      <div class="stat-row"><span>ENE</span><span class="stat-val" id="s-ene">0</span></div>
      <div class="stat-row"><span>INT</span><span class="stat-val" id="s-int">0</span></div>
      <div class="stat-row"><span>CMD</span><span class="stat-val" id="s-cmd">0</span></div>
      <div id="ability-info"></div>
    </div>
    <div class="panel-section" id="inventory-section">
      <h3>Inventory</h3>
      <div id="inventory-list" style="font-size:11px;color:#ccc;"></div>
    </div>
    <div class="panel-section">
      <h3>Goals</h3>
      <div id="goals-container"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- Right Panel -->
  <div id="right-panel">
    <div style="padding:8px;border-bottom:1px solid #3a2a5a"><h3 style="font-size:12px;color:#888;text-transform:uppercase">Combat Log</h3></div>
    <div id="combat-log"></div>
    <div id="nearby-panel">
      <h3>Nearby</h3>
      <div id="nearby-list"></div>
    </div>
  </div>

  <!-- Bottom Bar: dynamic action buttons -->
  <div id="bottom-bar">
    <div id="action-buttons" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1"></div>
    <button id="btn-wait" onclick="playerWait()" style="margin-left:auto">⏳ Wait</button>
    <button onclick="exportChronicle()" style="padding:6px 14px;background:#2a2a4a;border:1px solid #6a5a9a;color:#ccc;border-radius:5px;cursor:pointer;font-size:12px">📋 Chronicle</button>
  </div>
</div>

<script>
// ============================================================
// RPG ARENA - Complete Isometric Multiplayer RPG
// ============================================================

// --- Constants ---
let TILE_W = 32, TILE_H = 16; // Computed dynamically in resizeCanvas to fit full map on screen
const MAP_SIZE = 60;
const CLASS_COLORS = { Warrior:'#e04040', Guardian:'#4080e0', Scout:'#e0c040', Mage:'#a040e0', Sage:'#40d0d0', Commander:'#e08020' };
const CLASS_EMOJI = { Warrior:'⚔️', Guardian:'🛡️', Scout:'🏹', Mage:'🔮', Sage:'📜', Commander:'👑' };
const CLASS_LIST = ['Warrior','Guardian','Scout','Mage','Sage','Commander'];
const STAT_NAMES = ['atk','def','spd','ene','int','cmd'];
const STAT_LABELS = { atk:'Attack', def:'Defense', spd:'Speed', ene:'Energy', int:'Intelligence', cmd:'Command' };
const ABILITIES = {
  Warrior: { name:'Berserker Strike', desc:'Double damage (1x/combat)' },
  Guardian: { name:'Fortify', desc:'Negate all damage (1x/combat)' },
  Scout: { name:'Evasion', desc:'Auto-dodge next attack' },
  Mage: { name:'Energy Burst', desc:'AoE damage to nearby enemies' },
  Sage: { name:'Mind Link', desc:'+3 to counter-roll' },
  Commander: { name:'Rally', desc:'Nearby allies +2 to next roll' }
};

// ── Name-theme detection ──────────────────────────────────────────────────────
const NAME_THEMES = {
  fire:    { keys:['fire','flame','burn','ember','blaze','ash','pyro','inferno'],    color:'#ff6622', accent:'#ff4400' },
  shadow:  { keys:['shadow','dark','void','night','shade','black','dusk','death','bone','skull','crypt'], color:'#9966cc', accent:'#6633aa' },
  storm:   { keys:['storm','thunder','wind','bolt','gale','sky','cloud','volt','zap'], color:'#44aaff', accent:'#0077cc' },
  nature:  { keys:['leaf','grove','wild','green','root','thorn','vine','bark','fern','oak'], color:'#44cc44', accent:'#228822' },
  iron:    { keys:['iron','steel','forge','blade','anvil','hammer','smith','vault','stone'], color:'#aaaaaa', accent:'#666666' },
  light:   { keys:['light','holy','divine','sacred','dawn','sun','ray','gold','radiant'],  color:'#ffdd44', accent:'#ccaa00' },
  arcane:  { keys:['arcane','mystic','rune','spell','mage','mana','rift','nexus','hex'],   color:'#cc44ff', accent:'#8800cc' },
};

function detectTheme(name) {
  let lower = name.toLowerCase();
  for (let [key, def] of Object.entries(NAME_THEMES)) {
    if (def.keys.some(k => lower.includes(k))) return { key, ...def };
  }
  return { key:'default', color:'#f0c040', accent:'#cc8800' };
}

// ── Action button definitions keyed by stat + theme ────────────────────────
const ACTION_DEFS = {
  atk:  [
    { id:'melee',   label:(t)=>t==='fire'?'🔥 Flame Strike':t==='shadow'?'💀 Death Blow':t==='storm'?'⚡ Shock Slash':'⚔️ Strike',      desc:'Melee attack nearest enemy',          fn:'doMeleeAction',    color:'#c03030', key:'E' },
    { id:'special', label:(t)=>t==='fire'?'🔥 Berserker Blaze':t==='shadow'?'💀 Dark Fury':t==='storm'?'⚡ Thunder Rage':'⚔️ Berserk',  desc:'Special ability (class)',              fn:'doSpecialAction',  color:'#8822aa', key:'Space' },
  ],
  def:  [
    { id:'fortify', label:(t)=>t==='iron'?'🛡️ Steel Wall':t==='light'?'☀️ Divine Guard':t==='nature'?'🌿 Bark Skin':'🛡️ Fortify',      desc:'Boost defense this round',             fn:'doFortifyAction',  color:'#2255bb', key:'Q' },
  ],
  spd:  [
    { id:'dash',    label:(t)=>t==='storm'?'⚡ Gale Dash':t==='shadow'?'🌑 Shadow Step':t==='fire'?'🔥 Blaze Rush':'👟 Dash',           desc:'Move rapidly to clicked position',     fn:'doDashAction',     color:'#888800', key:'D' },
  ],
  ene:  [
    { id:'heal',    label:(t)=>t==='nature'?'🌿 Regenerate':t==='light'?'☀️ Mend':t==='arcane'?'🔮 Soul Mend':'💎 Recover',            desc:'Restore 2 HP; costs no turn',          fn:'doHealAction',     color:'#226622', key:'H' },
  ],
  int:  [
    { id:'scout',   label:(t)=>t==='arcane'?'🔮 Scry':t==='shadow'?'👁️ Dark Sight':t==='storm'?'⚡ Sensorstorm':'📖 Scout',           desc:'Reveal nearby mobs in log',            fn:'doScoutAction',    color:'#553388', key:'S' },
  ],
  cmd:  [
    { id:'ranged',  label:(t)=>t==='fire'?'🔥 Fire Arrow':t==='storm'?'⚡ Bolt':t==='shadow'?'💀 Death Ray':'🏹 Ranged',               desc:'Ranged attack (costs 1 ENE)',          fn:'doRangedAction',   color:'#885500', key:'F' },
    { id:'recruit', label:(t)=>t==='shadow'?'💀 Corrupt':t==='light'?'☀️ Convert':t==='arcane'?'🔮 Enthrall':'📣 Recruit',            desc:'Recruit nearest enemy mob',            fn:'doRecruitAction',  color:'#116633', key:'R' },
  ],
};

function buildActionButtons() {
  if (!player) return;
  let el = document.getElementById('action-buttons');
  if (!el) return;
  el.innerHTML = '';
  let theme = detectTheme(player.name);
  player._theme = theme;

  // Sort stats to pick actions for player's top 4 stats
  let sorted = Object.entries(player.stats).sort((a,b) => b[1]-a[1]);
  let used = new Set();
  let buttons = [];
  for (let [stat] of sorted) {
    let defs = ACTION_DEFS[stat] || [];
    for (let def of defs) {
      if (!used.has(def.id)) {
        used.add(def.id);
        buttons.push({ ...def, theme });
      }
    }
  }
  // Always ensure special is included
  if (!used.has('special')) {
    buttons.push({ ...ACTION_DEFS.atk[1], theme });
  }

  for (let btn of buttons.slice(0, 7)) {
    let b = document.createElement('button');
    b.className = 'action-btn';
    b.id = 'abtn-' + btn.id;
    b.title = btn.desc + ' [' + btn.key + ']';
    b.style.background = btn.theme.color + '33';
    b.style.borderColor = btn.theme.color;
    b.onclick = () => window[btn.fn] && window[btn.fn]();
    el.appendChild(b);
    btn._el = b;
  }
  player._actionBtns = buttons;
  refreshActionButtons();
}

function refreshActionButtons() {
  if (!player || !player._actionBtns) return;
  for (let btn of player._actionBtns) {
    let b = document.getElementById('abtn-' + btn.id);
    if (!b) continue;
    let label = typeof btn.label === 'function' ? btn.label(player._theme.key) : btn.label;
    let cd = getActionCooldown(btn.id);
    b.innerHTML = label + (cd > 0 ? '<span class="cd"> '+cd.toFixed(0)+'s</span>' : '');
    b.disabled = !player.alive || cd > 0 || (btn.id==='ranged' && player.energy<=0);
  }
}

function getActionCooldown(id) {
  if (!player) return 0;
  if (id === 'special') return Math.max(0, player.specialCooldown);
  if (id === 'ranged')  return Math.max(0, rangedCooldown);
  if (id === 'recruit') return Math.max(0, recruitCooldown);
  return 0;
}

// Thin wrappers so buttons call the right functions
function doMeleeAction() {
  // Move toward and attack nearest enemy
  if (!player || !player.alive) return;
  let enemies = entities.filter(e => e.alive && e.team !== player.team);
  if (!enemies.length) return;
  let nearest = enemies.sort((a,b)=>distFloat(player,a)-distFloat(player,b))[0];
  if (distFloat(player, nearest) <= 1.3) {
    performAttack(player, nearest);
  } else {
    player.moveVX = Math.sign(nearest.x - player.x);
    player.moveVY = Math.sign(nearest.y - player.y);
    addLog('Moving toward ' + nearest.name + '...', 'log-info');
  }
}
function doSpecialAction() { if (player && player.alive) useSpecial(player); }
function doFortifyAction() {
  if (!player || !player.alive) return;
  player.abilityActive.fortify = true;
  addLog('🛡️ Bracing for impact...', 'log-info');
}
function doDashAction() {
  if (!player || !player.alive) return;
  // Move toward nearest castle or enemy
  let target = castles.find(c => c.team !== player.team) || entities.find(e=>e.alive&&e.team!==player.team);
  if (target) {
    let speed = player.stats.spd * 3;
    let dx = target.x-player.x, dy = target.y-player.y, len=Math.sqrt(dx*dx+dy*dy)||1;
    player.x = Math.max(2,Math.min(MAP_SIZE-3,player.x+dx/len*Math.min(speed*0.5,len)));
    player.y = Math.max(2,Math.min(MAP_SIZE-3,player.y+dy/len*Math.min(speed*0.5,len)));
    addLog('💨 Dash!', 'log-info');
  }
}
function doHealAction() {
  if (!player || !player.alive) return;
  let amt = 2;
  player.hp = Math.min(player.maxHp, player.hp + amt);
  spawnFloatingText(player.x, player.y, '+'+amt+' HP', '#44ff44');
  addLog('💎 Recovered '+amt+' HP!', 'log-heal');
}
function doScoutAction() {
  if (!player || !player.alive) return;
  let range = 2 + player.stats.int * 2;
  let near = entities.filter(e => e.alive && e.team !== player.team && distFloat(player,e) <= range);
  if (!near.length) { addLog('📖 Nothing detected within '+range+' tiles.', 'log-info'); return; }
  for (let e of near.slice(0,4)) {
    addLog('👁️ '+e.name+' HP:'+e.hp+'/'+e.maxHp+' ATK:'+e.stats.atk+' DEF:'+e.stats.def, 'log-info');
  }
}
function doRangedAction() { attemptRangedAttack(); }
function doRecruitAction() { attemptRecruit(); }

// ── Mob narration system ──────────────────────────────────────────────────────
let narrationTimer = 0;
let narrationQueue = []; // full log for chronicle
let narrationIndex = 0; // which mob speaks next

const MOB_QUIPS = {
  winning: [
    '{name} snarls: "This field belongs to us now!"',
    '{name} roars: "Another castle falls! Victory is near!"',
    '{name} cackles: "They scatter like rats!"',
    '{name} bellows: "None shall stand against {team}!"',
  ],
  losing: [
    '{name} growls: "We are outnumbered... regroup!"',
    '{name} hisses: "Fall back! We need to rethink this."',
    '{name} mutters: "They are stronger than expected..."',
    '{name} warns: "Our castles are falling!"',
  ],
  combat: [
    '{name} shouts: "For {team}! No mercy!"',
    '{name} yells: "I\'ve taken wounds but I fight on!"',
    '{name} sneers: "Is that all you\'ve got?"',
    '{name} growls: "Blood and glory! CHARGE!"',
  ],
  retreat: [
    '{name} gasps: "I need to fall back and recover..."',
    '{name} pants: "The castle... I must reach it!"',
    '{name} winces: "Just a few more steps..."',
  ],
  recharge: [
    '{name} rests: "Gathering energy within these walls..."',
    '{name} breathes: "The castle restores me."',
    '{name} mutters: "Almost ready to return to battle."',
  ],
  castleCap: [
    '{name} declares: "This fortress is ours! Raise the flag!"',
    '{name} howls: "Castle taken! {team} expands its domain!"',
  ],
  idle: [
    '{name} observes: "The field is quiet... for now."',
    '{name} watches: "Where will the next clash be?"',
    '{name} surveys: "I count the enemy with care."',
  ],
};

function getMobNarration(mob) {
  if (!mob || !mob.alive) return null;
  const TEAM_NAMES = ['Chaos','Nature','Arcane','Iron'];
  let teamName = TEAM_NAMES[mob.team] || 'Unknown';
  // Pick quip category based on state
  let cat = 'idle';
  if (mob.aiState === 'retreat') cat = 'retreat';
  else if (mob.aiState === 'recharge') cat = 'recharge';
  else {
    // Is this team winning (more alive mobs)?
    let teamAlive = [0,0,0,0];
    for (let e of entities) if (e.alive && e.team >= 0) teamAlive[e.team]++;
    let myCount = teamAlive[mob.team] || 0;
    let maxCount = Math.max(...teamAlive);
    let totalAlive = teamAlive.reduce((a,b)=>a+b,0);
    let recent = gameEvents.slice(-3).find(ev=>ev.type==='castle_captured');
    if (recent && recent.detail && recent.detail.includes(teamName)) { cat = 'castleCap'; }
    else if (myCount === maxCount) cat = 'winning';
    else if (myCount < maxCount * 0.6) cat = 'losing';
    else cat = 'combat';
  }
  let pool = MOB_QUIPS[cat] || MOB_QUIPS.idle;
  let template = pool[Math.floor(Math.random() * pool.length)];
  return template.replace(/{name}/g, mob.name).replace(/{team}/g, teamName);
}

function tickNarration(dt) {
  narrationTimer += dt;
  if (narrationTimer < 6) return;
  narrationTimer = 0;
  let alive = entities.filter(e => e.alive && !e.isPlayer);
  if (!alive.length) return;
  narrationIndex = (narrationIndex + 1) % alive.length;
  let mob = alive[narrationIndex % alive.length];
  let line = getMobNarration(mob);
  if (!line) return;
  let teamCol = TEAM_COLORS[mob.team] || '#aaa';
  addLog(line, 'log-narrate', teamCol);
  narrationQueue.push({ time: gameTime, mob: mob.name, team: mob.team, line });
}

function exportChronicle() {
  let lines = [];
  lines.push('═══════════════════════════════════════');
  lines.push('  RPG ARENA — BATTLE CHRONICLE');
  lines.push('═══════════════════════════════════════');
  if (player) {
    let pDisplay = player.displayName || player.name;
    lines.push('Hero: ' + pDisplay + ' the ' + player.cls);
    lines.push('Team: ' + (['CHAOS','NATURE','ARCANE','IRON'][player.team]||'Unknown'));
    lines.push('Score: ' + (kills*10+itemsCollected*5+goalsCompleted*25+Math.floor(gameTime/10)));
    lines.push('');
  }
  lines.push('── NARRATIVE ───────────────────────────');
  lines.push(generateNarrative());
  lines.push('');
  lines.push('── MOB VOICES ──────────────────────────');
  for (let n of narrationQueue) {
    lines.push('['+Math.floor(n.time)+'s] '+n.line);
  }
  lines.push('');
  lines.push('── EVENTS ──────────────────────────────');
  for (let ev of gameEvents) {
    lines.push('['+Math.floor(ev.time)+'s] '+ev.type+': '+ev.detail);

  lines.push('');

  for (let entry of combatLogEntries || []) {
    lines.push(entry);

  lines.push('═══════════════════════════════════════');
  let text = lines.join('\n');
  let blob = new Blob([text], {type:'text/plain'});
  let a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rpg-arena-chronicle.txt';
  a.click();
}

// --- Seeded random for tile decorations ---
function tileRand(x, y, seed) {
  let h = (x * 374761393 + y * 668265263 + seed * 1274126177) ^ 0x5bf03635;
  h = Math.imul(h ^ (h >>> 13), 0x5bd1e995);
  h = h ^ (h >>> 15);
  return (h >>> 0) / 4294967296;
}

// --- Map Generation ---
function generateMap() {
  tiles = [];
  for (let y = 0; y < MAP_SIZE; y++) {
    tiles[y] = [];
    for (let x = 0; x < MAP_SIZE; x++) {
      let r = Math.random();
      if (x === 0 || y === 0 || x === MAP_SIZE-1 || y === MAP_SIZE-1) {
        tiles[y][x] = 'wall';
      } else if (r < 0.45) {
        tiles[y][x] = 'grass';
      } else if (r < 0.58) {
        tiles[y][x] = 'forest';
      } else if (r < 0.65) {
        tiles[y][x] = 'stone';
      } else if (r < 0.70) {
        tiles[y][x] = 'sand';
      } else if (r < 0.74) {
        tiles[y][x] = 'swamp';
      } else if (r < 0.77) {
        tiles[y][x] = 'ice';
      } else if (r < 0.79) {
        
      } else {
        tiles[y][x] = 'grass';
      }
    }
  }

  // --- RIVERS: 2-3 winding rivers from edge to edge ---
  let numRivers = 2 + Math.floor(Math.random()*2);
  for (let ri = 0; ri < numRivers; ri++) {
    let horizontal = Math.random() < 0.5;
    let rx, ry;
    if (horizontal) { rx = 1; ry = 5 + Math.floor(Math.random()*(MAP_SIZE-10)); }
    else { rx = 5 + Math.floor(Math.random()*(MAP_SIZE-10)); ry = 1; }
    let steps = 0;
    while (rx > 0 && rx < MAP_SIZE-1 && ry > 0 && ry < MAP_SIZE-1 && steps < MAP_SIZE*2) {
      // Make river 2-3 wide
      let width = 2 + (tileRand(rx, ry, ri+50) < 0.4 ? 1 : 0);
      for (let w = 0; w < width; w++) {
        let wx = horizontal ? rx : rx + w;
        let wy = horizontal ? ry + w : ry;
        if (wx > 0 && wx < MAP_SIZE-1 && wy > 0 && wy < MAP_SIZE-1) tiles[wy][wx] = 'water';
      }
      if (horizontal) { rx++; ry += Math.random() < 0.3 ? (Math.random()<0.5?1:-1) : 0; }
      else { ry++; rx += Math.random() < 0.3 ? (Math.random()<0.5?1:-1) : 0; }
      ry = Math.max(1, Math.min(MAP_SIZE-2, ry));
      rx = Math.max(1, Math.min(MAP_SIZE-2, rx));
      steps++;
    }
  }

  // --- ROADS: 2-3 winding roads connecting areas ---
  let numRoads = 2 + Math.floor(Math.random()*2);
  for (let ri = 0; ri < numRoads; ri++) {
    let horizontal = Math.random() < 0.5;
    let rx, ry;
    if (horizontal) { rx = 1; ry = 8 + Math.floor(Math.random()*(MAP_SIZE-16)); }
    else { rx = 8 + Math.floor(Math.random()*(MAP_SIZE-16)); ry = 1; }
    let steps = 0;
    while (rx > 0 && rx < MAP_SIZE-1 && ry > 0 && ry < MAP_SIZE-1 && steps < MAP_SIZE*2) {
      if (tiles[ry][rx] !== 'water') tiles[ry][rx] = 'road';
      if (horizontal) { rx++; ry += Math.random() < 0.2 ? (Math.random()<0.5?1:-1) : 0; }
      else { ry++; rx += Math.random() < 0.2 ? (Math.random()<0.5?1:-1) : 0; }
      ry = Math.max(1, Math.min(MAP_SIZE-2, ry));
      rx = Math.max(1, Math.min(MAP_SIZE-2, rx));
      steps++;
    }
  }

  // --- BRIDGES over rivers where roads cross ---
  for (let y = 2; y < MAP_SIZE-2; y++) {
    for (let x = 2; x < MAP_SIZE-2; x++) {
      if (tiles[y][x] === 'water') {
        // Check if road is nearby on both sides
        let hasLandH = (x>1 && tiles[y][x-1]!=='water' && x<MAP_SIZE-2 && tiles[y][x+1]==='water');
        if (hasLandH && Math.random() < 0.08) { tiles[y][x] = 'bridge'; if(x+1<MAP_SIZE-1 && tiles[y][x+1]==='water') tiles[y][x+1]='bridge'; }
        let hasLandV = (y>1 && tiles[y-1][x]!=='water' && y<MAP_SIZE-2 && tiles[y+1][x]==='water');
        if (hasLandV && Math.random() < 0.08) { tiles[y][x] = 'bridge'; if(y+1<MAP_SIZE-1 && tiles[y+1][x]==='water') tiles[y+1][x]='bridge'; }
      }
    }
  }

  // Sand clusters
  for (let y = 2; y < MAP_SIZE-2; y++) {
    for (let x = 2; x < MAP_SIZE-2; x++) {
      if (tiles[y][x] === 'sand' && Math.random() < 0.4) {
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            let nx = x+dx, ny = y+dy;
            if (nx > 0 && nx < MAP_SIZE-1 && ny > 0 && ny < MAP_SIZE-1 && tiles[ny][nx] === 'grass') tiles[ny][nx] = 'sand';
          }
        }
      }
    }
  }

  // --- FORTRESS WALLS: 3-4 wall segments with corner towers ---
  let numForts = 3 + Math.floor(Math.random()*2);
  for (let fi = 0; fi < numForts; fi++) {
    let fx = 5 + Math.floor(Math.random()*(MAP_SIZE-20));
    let fy = 5 + Math.floor(Math.random()*(MAP_SIZE-20));
    let len = 8 + Math.floor(Math.random()*8);
    let horiz = Math.random() < 0.5;
    for (let i = 0; i < len; i++) {
      let wx = fx + (horiz ? i : 0), wy = fy + (horiz ? 0 : i);
      if (wx>0 && wx<MAP_SIZE-1 && wy>0 && wy<MAP_SIZE-1) tiles[wy][wx] = 'wall';
    }
    // Corner towers (2x2 blocks)
    for (let ty = 0; ty < 2; ty++) for (let tx = 0; tx < 2; tx++) {
      let t1x = fx+tx, t1y = fy+ty;
      let t2x = fx+(horiz?len-1:0)+tx, t2y = fy+(horiz?0:len-1)+ty;
      if (t1x>0&&t1x<MAP_SIZE-1&&t1y>0&&t1y<MAP_SIZE-1) tiles[t1y][t1x] = 'tower';
      if (t2x>0&&t2x<MAP_SIZE-1&&t2y>0&&t2y<MAP_SIZE-1) tiles[t2y][t2x] = 'tower';
    }
  }

  // --- DUNGEON COMPLEXES: 2-3 rectangular rooms ---
  let numDungeons = 2 + Math.floor(Math.random()*2);
  for (let di = 0; di < numDungeons; di++) {
    let dw = 8 + Math.floor(Math.random()*5);
    let dh = 8 + Math.floor(Math.random()*5);
    let dx = 4 + Math.floor(Math.random()*(MAP_SIZE-dw-8));
    let dy = 4 + Math.floor(Math.random()*(MAP_SIZE-dh-8));
    // Walls
    for (let yy = dy; yy < dy+dh && yy < MAP_SIZE-1; yy++) {
      for (let xx = dx; xx < dx+dw && xx < MAP_SIZE-1; xx++) {
        if (yy===dy||yy===dy+dh-1||xx===dx||xx===dx+dw-1) tiles[yy][xx] = 'wall';
        else tiles[yy][xx] = 'dungeon';
      }
    }
    // Entrance
    let entranceX = dx + Math.floor(dw/2);
    if (entranceX < MAP_SIZE-1) tiles[dy+dh-1][entranceX] = 'dungeon';
  }

  // --- STANDALONE TOWERS ---
  let numTowers = 4 + Math.floor(Math.random()*4);
  for (let ti = 0; ti < numTowers; ti++) {
    let tx = 3 + Math.floor(Math.random()*(MAP_SIZE-6));
    let ty = 3 + Math.floor(Math.random()*(MAP_SIZE-6));
    if (tiles[ty][tx] === 'grass' || tiles[ty][tx] === 'stone') tiles[ty][tx] = 'tower';
  }
}

// --- Utility ---
function d6() { return 1 + Math.floor(Math.random() * 6); }

function shuffleStats() {
  let vals = [1,2,3,4,5,6];
  for (let i = vals.length - 1; i > 0; i--) { let j = Math.floor(Math.random()*(i+1)); [vals[i],vals[j]]=[vals[j],vals[i]]; }
  return { atk: vals[0], def: vals[1], spd: vals[2], ene: vals[3], int: vals[4], cmd: vals[5] };
}

function getClass(stats) {
  let max = 0, maxStat = 'atk';
  for (let s of STAT_NAMES) { if (stats[s] > max) { max = stats[s]; maxStat = s; } }
  return CLASS_LIST[STAT_NAMES.indexOf(maxStat)];
}

function dist(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function distFloat(a, b) { return Math.sqrt((a.x - b.x)**2 + (a.y - b.y)**2); }

function isoProject(tx, ty) {
  return { sx: (tx - ty) * (TILE_W / 2), sy: (tx + ty) * (TILE_H / 2) };
}

function walkable(x, y) {
  if (x < 0 || y < 0 || x >= MAP_SIZE || y >= MAP_SIZE) return false;
  let t = tiles[y][x];
  return t !== 'wall'; // water/lava slow but don't block
}

function tileSpeedMult(x, y) {
  if (x < 0 || y < 0 || x >= MAP_SIZE || y >= MAP_SIZE) return 1;
  let t = tiles[Math.floor(y)][Math.floor(x)];
  if (t === 'water') return 0.35;
  
  if (t === 'swamp') return 0.45;
  if (t === 'sand')  return 0.75;
  if (t === 'ice')   return 1.3; // slippery fast
  if (t === 'road')  return 1.5;
  return 1;
}

function randomName(teamId) {
  if (teamId !== undefined) {
    let pool = TEAMS[teamId].monsters;
    return pool[Math.floor(Math.random()*pool.length)];
  }
  let emoji = MOB_EMOJI[Math.floor(Math.random()*MOB_EMOJI.length)];
  return emoji + ' ' + ADJ[Math.floor(Math.random()*ADJ.length)] + ' ' + MONSTERS[Math.floor(Math.random()*MONSTERS.length)];
}

// --- Sound ---
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioUnlocked = true; } catch(e) {}
}

function playSound(freq, type, dur, freqEnd, vol) {
  if (!audioCtx || !audioUnlocked) return;
  try {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), audioCtx.currentTime + dur);
    gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function playNoise(dur, vol) {
  if (!audioCtx || !audioUnlocked) return;
  try {
    let buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
    let d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    let src = audioCtx.createBufferSource();
    src.buffer = buf;
    let gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    src.connect(gain).connect(audioCtx.destination);
    src.start();
  } catch(e) {}
}
